<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Constellation</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #030510; display: flex; align-items: center; justify-content: center; font-family: monospace; }
#app { width: 100%; max-width: 420px; background: #060818; display: flex; flex-direction: column; height: 100vh; max-height: 780px; border-radius: 16px; overflow: hidden; }
#toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #0a0f2a; border-bottom: 1px solid #1a2a55; flex-shrink: 0; }
#word-row { display: flex; gap: 7px; flex-wrap: wrap; }
.tile { width: 28px; height: 28px; border-radius: 5px; border: 1px solid #2a3a6a; background: #0d1530; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #4466aa; transition: all 0.3s; }
.tile.found { border-color: #4488ff; color: #99ccff; background: #0d1f4a; box-shadow: 0 0 8px #2244aa55; }
#btns { display: flex; gap: 7px; flex-shrink: 0; }
button { background: #0d1530; border: 1px solid #2a3a6a; border-radius: 6px; color: #6688bb; font-family: monospace; font-size: 11px; padding: 5px 11px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
button:active { opacity: 0.7; }
#reveal-btn { background: #1a1000; border-color: #664422; color: #cc9944; }
#canvas-wrap { position: relative; flex: 1; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }
#ref { display: none; position: absolute; top: 8px; right: 8px; background: rgba(8,12,36,0.96); border: 1px solid #1a2a5a; border-radius: 10px; padding: 10px; z-index: 10; max-height: 90%; overflow-y: auto; }
#ref.open { display: block; }
#ref-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
.rc { display: flex; flex-direction: column; align-items: center; }
.rl { color: #445588; font-size: 9px; }
#msg { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: #ffd080; font-size: 14px; pointer-events: none; opacity: 0; transition: opacity 0.4s; white-space: nowrap; text-shadow: 0 0 12px #aa7700; }
#hint { text-align: center; padding: 6px; color: #1e2e44; font-size: 10px; flex-shrink: 0; }
#new-btn-wrap { text-align: center; padding: 4px; flex-shrink: 0; }
#new-btn { background: #0d1530; border: 1px solid #1a2a55; border-radius: 6px; color: #334466; font-family: monospace; font-size: 10px; padding: 3px 10px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div id="word-row"></div>
    <div id="btns">
      <button id="reveal-btn" onclick="toggleReveal()">reveal</button>
      <button onclick="document.getElementById('ref').classList.toggle('open')">A–Z ▾</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="ref"><div id="ref-grid"></div></div>
    <div id="msg"></div>
  </div>
  <div id="hint">tap a star to find it · drag to connect stars</div>
  <div id="new-btn-wrap"><button id="new-btn" onclick="newGame()">new word ↺</button></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
  place();
}

const DEFS = {
  A:{pts:[[1,0],[0,4],[2,4],[0.5,2.5],[1.5,2.5]],edges:[[0,1],[0,2],[3,4]]},
  B:{pts:[[0,0],[0,4],[1.8,1],[0,2],[1.8,3]],edges:[[0,1],[0,2],[2,3],[3,4],[4,1]]},
  C:{pts:[[2,0],[0,0],[0,4],[2,4]],edges:[[0,1],[1,2],[2,3]]},
  D:{pts:[[0,0],[0,4],[2,2]],edges:[[0,1],[0,2],[1,2]]},
  E:{pts:[[2,0],[0,0],[0,4],[2,4],[0,2],[1.5,2]],edges:[[0,1],[1,2],[2,3],[2,4],[4,5]]},
  F:{pts:[[2,0],[0,0],[0,4],[0,2],[1.5,2]],edges:[[0,1],[1,2],[3,4]]},
  G:{pts:[[2,0],[0,0],[0,4],[2,4],[2,2],[1,2]],edges:[[0,1],[1,2],[2,3],[3,4],[4,5]]},
  H:{pts:[[0,0],[0,4],[2,0],[2,4],[0,2],[2,2]],edges:[[0,1],[2,3],[4,5]]},
  I:{pts:[[0,0],[2,0],[1,0],[1,4],[0,4],[2,4]],edges:[[0,1],[2,3],[4,5]]},
  J:{pts:[[0,0],[2,0],[2,3],[1,4],[0,3]],edges:[[0,1],[1,2],[2,3],[3,4]]},
  K:{pts:[[0,0],[0,4],[2,0],[0,2],[2,4]],edges:[[0,1],[2,3],[3,4]]},
  L:{pts:[[0,0],[0,4],[2,4]],edges:[[0,1],[1,2]]},
  M:{pts:[[0,4],[0,0],[1,2],[2,0],[2,4]],edges:[[0,1],[1,2],[2,3],[3,4]]},
  N:{pts:[[0,4],[0,0],[2,4],[2,0]],edges:[[0,1],[1,2],[2,3]]},
  O:{pts:[[0,0],[2,0],[2,4],[0,4]],edges:[[0,1],[1,2],[2,3],[3,0]]},
  P:{pts:[[0,0],[0,4],[2,0],[2,2],[0,2]],edges:[[0,1],[0,2],[2,3],[3,4]]},
  R:{pts:[[0,0],[0,4],[2,0],[2,2],[0,2],[2,4]],edges:[[0,1],[0,2],[2,3],[3,4],[4,5]]},
  S:{pts:[[2,0],[0,0],[0,2],[2,2],[2,4],[0,4]],edges:[[0,1],[1,2],[2,3],[3,4],[4,5]]},
  T:{pts:[[0,0],[2,0],[1,0],[1,4]],edges:[[0,1],[2,3]]},
  U:{pts:[[0,0],[0,4],[2,4],[2,0]],edges:[[0,1],[1,2],[2,3]]},
  V:{pts:[[0,0],[1,4],[2,0]],edges:[[0,1],[1,2]]},
  W:{pts:[[0,0],[0.5,4],[1,2],[1.5,4],[2,0]],edges:[[0,1],[1,2],[2,3],[3,4]]},
  X:{pts:[[0,0],[2,4],[1,2],[0,4],[2,0]],edges:[[0,1],[3,4]]},
  Y:{pts:[[0,0],[1,2],[2,0],[1,4]],edges:[[0,1],[2,1],[1,3]]},
  Z:{pts:[[0,0],[2,0],[0,4],[2,4]],edges:[[0,1],[1,2],[2,3]]},
};

const WORDS = ['STAR','MOON','NOVA','MARS','FLUX','GUST','COMET','ORBIT','VEGA','BLAZE','STORM','NIGHT','FROST'];

let WORD, WORD_SET;
let revealed = false;
let cons = [], bgStars = [];
let hov = null, dragging = false, dragA = null, dragB = null;
let found = new Set();
let touchId = null;

function ekey(a,b){ return a<b?`${a}-${b}`:`${b}-${a}`; }

function tx(pts,cx,cy,sc,ang,skx,sky){
  return pts.map(([x,y])=>{
    const nx=x*sc+y*skx, ny=y*sc+x*sky;
    return [cx+nx*Math.cos(ang)-ny*Math.sin(ang), cy+nx*Math.sin(ang)+ny*Math.cos(ang)];
  });
}

function place(){
  if(!W||!H) return;
  cons=[];
  const wl=[...WORD_SET];
  const ex=Object.keys(DEFS).filter(l=>!WORD_SET.has(l)).sort(()=>Math.random()-0.5).slice(0,9);
  const all=[...wl,...ex].sort(()=>Math.random()-0.5);
  const cols=3, rows=4, cw=W/cols, ch=H/rows;
  const cells=[];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) cells.push([c,r]);
  cells.sort(()=>Math.random()-0.5);
  all.slice(0,cells.length).forEach((letter,i)=>{
    const [col,row]=cells[i];
    const cx=col*cw+cw*0.2+Math.random()*cw*0.6;
    const cy=row*ch+ch*0.15+Math.random()*ch*0.65;
    const sc=Math.min(cw,ch)*0.22+Math.random()*8;
    const ang=(Math.random()-0.5)*0.75;
    const skx=(Math.random()-0.5)*0.5;
    const sky=(Math.random()-0.5)*0.4;
    const placed=tx(DEFS[letter].pts,cx,cy,sc,ang,skx,sky);
    cons.push({
      letter, stars:placed.map(([x,y])=>({x,y})),
      edges:DEFS[letter].edges, drawn:new Set(), done:false,
      isWord:WORD_SET.has(letter)
    });
  });
  bgStars=[];
  for(let i=0;i<180;i++) bgStars.push({x:Math.random()*W,y:Math.random()*H,r:0.4+Math.random()*1,t:Math.random()*Math.PI*2});
}

function getStarAt(mx,my){
  let best=null, bestD=900;
  for(const con of cons){
    if(!con.isWord) continue;
    for(let i=0;i<con.stars.length;i++){
      const s=con.stars[i],dx=s.x-mx,dy=s.y-my,d=dx*dx+dy*dy;
      if(d<bestD){bestD=d;best={con,idx:i};}
    }
  }
  return best;
}

function checkDone(con){
  if(con.done) return;
  if(con.edges.every(([a,b])=>con.drawn.has(ekey(a,b)))){
    con.done=true; found.add(con.letter); updateTiles();
    if(found.size===WORD_SET.size) setTimeout(()=>flash('✦ '+WORD+' complete! ✦'),100);
    else flash(con.letter+' found!');
  }
}

let t0=performance.now();
function draw(now){
  const t=(now-t0)*0.001;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#060818'; ctx.fillRect(0,0,W,H);

  bgStars.forEach(s=>{
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(160,180,255,${0.08+0.14*Math.sin(t*0.8+s.t)})`; ctx.fill();
  });

  cons.forEach(con=>{
    if(revealed){
      con.edges.forEach(([a,b])=>{
        const sa=con.stars[a],sb=con.stars[b];
        ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(sb.x,sb.y);
        ctx.strokeStyle=con.isWord?'rgba(80,210,120,0.55)':'rgba(55,55,85,0.18)';
        ctx.lineWidth=1; ctx.stroke();
      });
    }
    con.drawn.forEach(key=>{
      const [ai,bi]=key.split('-').map(Number);
      const sa=con.stars[ai],sb=con.stars[bi];
      const ok=con.edges.some(([a,b])=>ekey(a,b)===key);
      ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(sb.x,sb.y);
      ctx.strokeStyle=ok?'rgba(100,160,255,0.85)':'rgba(200,80,80,0.5)';
      ctx.lineWidth=1.5; ctx.stroke();
    });
    con.stars.forEach((s,i)=>{
      const isHov=con.isWord&&hov&&hov.con===con&&hov.idx===i;
      const isDrag=con.isWord&&((dragA&&dragA.con===con&&dragA.idx===i)||(dragB&&dragB.con===con&&dragB.idx===i));
      const lit=isHov||isDrag;
      let r,color,gb=0,gc='transparent';
      if(!con.isWord){
        r=1.5; color=revealed?'rgba(75,75,105,0.35)':'rgba(110,125,165,0.11)';
      } else if(con.done){
        r=4; color='rgba(100,225,140,0.95)'; gb=8; gc='#33cc66';
      } else if(lit){
        r=7; color='#eef4ff'; gb=20; gc='#55aaff';
      } else if(con.drawn.size>0){
        r=4; color='rgba(100,150,255,0.9)'; gb=6; gc='#3355cc';
      } else {
        r=3.5; color='rgba(150,175,255,0.65)';
      }
      ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
      ctx.shadowBlur=gb; ctx.shadowColor=gc;
      ctx.fillStyle=color; ctx.fill(); ctx.shadowBlur=0;
    });
  });

  if(dragging&&dragA&&dragB&&dragA.con===dragB.con&&dragA.idx!==dragB.idx){
    const sa=dragA.con.stars[dragA.idx], ea=dragB.con.stars[dragB.idx];
    ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(ea.x,ea.y);
    ctx.strokeStyle='rgba(140,195,255,0.5)'; ctx.lineWidth=1.2;
    ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
  }
  requestAnimationFrame(draw);
}

function getPos(e, touch){
  const r=canvas.getBoundingClientRect(), sx=W/r.width, sy=H/r.height;
  const src=touch||e;
  return [(src.clientX-r.left)*sx, (src.clientY-r.top)*sy];
}

canvas.addEventListener('mousemove',e=>{
  const[x,y]=getPos(e); hov=getStarAt(x,y);
  if(dragging) dragB=hov;
});
canvas.addEventListener('mousedown',e=>{
  const[x,y]=getPos(e),s=getStarAt(x,y);
  if(s){dragging=true;dragA=s;dragB=s;}
});
canvas.addEventListener('mouseup',()=>{
  if(dragging&&dragA&&dragB&&dragA.con===dragB.con&&dragA.idx!==dragB.idx){
    dragA.con.drawn.add(ekey(dragA.idx,dragB.idx)); checkDone(dragA.con);
  }
  dragging=false;dragA=null;dragB=null;
});
canvas.addEventListener('mouseleave',()=>{dragging=false;dragA=null;dragB=null;hov=null;});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const touch=e.changedTouches[0]; touchId=touch.identifier;
  const[x,y]=getPos(e,touch),s=getStarAt(x,y);
  if(s){dragging=true;dragA=s;dragB=s;}
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const touch of e.changedTouches){
    if(touch.identifier===touchId){
      const[x,y]=getPos(e,touch); hov=getStarAt(x,y);
      if(dragging) dragB=hov;
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(dragging&&dragA&&dragB&&dragA.con===dragB.con&&dragA.idx!==dragB.idx){
    dragA.con.drawn.add(ekey(dragA.idx,dragB.idx)); checkDone(dragA.con);
  }
  dragging=false;dragA=null;dragB=null;hov=null;touchId=null;
},{passive:false});

function buildTiles(){
  const row=document.getElementById('word-row'); row.innerHTML='';
  WORD.split('').forEach(l=>{
    const d=document.createElement('div'); d.className='tile'; d.id='tile-'+l; d.textContent=l;
    row.appendChild(d);
  });
}
function updateTiles(){
  WORD_SET.forEach(l=>{
    const d=document.getElementById('tile-'+l);
    if(d&&found.has(l)) d.classList.add('found');
  });
}
function flash(txt){
  const el=document.getElementById('msg'); el.textContent=txt; el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',1800);
}
function toggleReveal(){
  revealed=!revealed;
  document.getElementById('reveal-btn').textContent=revealed?'hide':'reveal';
}
function newGame(){
  revealed=false;
  document.getElementById('reveal-btn').textContent='reveal';
  found=new Set();
  WORD=WORDS[Math.floor(Math.random()*WORDS.length)];
  WORD_SET=new Set(WORD.split(''));
  buildTiles(); place();
}

function buildRef(){
  const grid=document.getElementById('ref-grid'),S=40,PAD=5,SC=(S-PAD*2)/4;
  Object.entries(DEFS).forEach(([letter,{pts,edges}])=>{
    const cell=document.createElement('div'); cell.className='rc';
    const cv=document.createElement('canvas'); cv.width=S; cv.height=S;
    const c=cv.getContext('2d');
    const sc=pts.map(([x,y])=>[PAD+x*SC,PAD+y*SC]);
    edges.forEach(([a,b])=>{
      c.beginPath(); c.moveTo(sc[a][0],sc[a][1]); c.lineTo(sc[b][0],sc[b][1]);
      c.strokeStyle='rgba(80,120,220,0.5)'; c.lineWidth=1; c.stroke();
    });
    sc.forEach(([x,y])=>{
      c.beginPath(); c.arc(x,y,2,0,Math.PI*2);
      c.fillStyle='#99bbff'; c.shadowBlur=4; c.shadowColor='#4477ff'; c.fill(); c.shadowBlur=0;
    });
    const lbl=document.createElement('div'); lbl.className='rl'; lbl.textContent=letter;
    cell.appendChild(cv); cell.appendChild(lbl); grid.appendChild(cell);
  });
}

WORD=WORDS[Math.floor(Math.random()*WORDS.length)];
WORD_SET=new Set(WORD.split(''));
buildTiles(); buildRef();
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
